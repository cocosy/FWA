<style>
  /* ---------- tweak these ---------- */
  :root {
    --paper: #f6f1e7;        /* warm off-white */
    --ink: #20201d;
    --accent: #b2432c;       /* muted rust */
    --muted: #8d8576;
    --line: #ddd4c2;
  }
  /* --------------------------------- */

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: "Newsreader", Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    padding: 40px 28px;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* margin:auto centers the sheet when it fits, but lets it scroll
     from the top (no clipping) when the content is taller than the window */
  .sheet { width: 100%; max-width: 560px; margin: auto; position: relative; z-index: 2; }

  /* small letterspaced label style */
  .ticker {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.34em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rule { border: none; border-top: 1px solid var(--line); margin: 14px 0 40px; }

  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 400;
    font-size: clamp(2.7rem, 11vw, 4.6rem);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  h1 em { font-style: italic; color: var(--accent); }

  .subtitle {
    color: var(--muted);
    margin-bottom: 40px;
    font-size: 1.05rem;
    font-style: italic;
  }

  .step { display: none; }
  .step.active { display: block; animation: rise 0.5s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  button, .btn {
    font-family: "Newsreader", serif;
    cursor: pointer;
    background: none;
    border: 1px solid var(--ink);
    border-radius: 1px;
    padding: 11px 24px;
    font-size: 1rem;
    color: var(--ink);
    transition: background .15s ease, color .15s ease, transform .15s ease, opacity .2s;
  }

  .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-primary:disabled:hover { background: var(--ink); }

  .btn-row { display: flex; gap: 14px; align-items: center; min-height: 56px; }
  #btn-no {
    color: var(--muted);
    border-color: var(--line);
    transition: transform .18s cubic-bezier(.2,.7,.2,1), background .15s, color .15s;
    position: relative;
    z-index: 5;
  }

  /* day chips */
  .days { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
  .day {
    border: 1px solid var(--line);
    border-radius: 1px;
    padding: 10px 14px;
    text-align: left;
    line-height: 1.3;
    font-size: 1rem;
  }
  .day .dow {
    display: block; font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 2px;
  }
  .day:hover { border-color: var(--ink); }
  .day.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .day.selected .dow { color: var(--paper); opacity: 0.7; }

  .or {
    font-family: "JetBrains Mono", monospace;
    color: var(--muted); margin: 6px 0 16px;
    font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
  }
  input[type="date"], select {
    font-family: "Newsreader", serif; font-size: 1rem;
    padding: 10px 12px; border-radius: 1px;
    border: 1px solid var(--line);
    background: transparent; color: var(--ink);
    margin: 0 6px 6px 0;
  }

  /* activity list, a contents page */
  .options { list-style: none; margin-bottom: 32px; border-top: 1px solid var(--line); }
  .option {
    display: flex; align-items: baseline; gap: 16px;
    width: 100%;
    border: none; border-bottom: 1px solid var(--line);
    border-radius: 0;
    padding: 14px 6px;
    text-align: left;
  }
  .option .num {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem; color: var(--muted); min-width: 20px; padding-top: 4px;
  }
  .option .body { display: flex; flex-direction: column; gap: 1px; }
  .option .label { font-family: "Fraunces", serif; font-size: 1.3rem; line-height: 1.1; }
  .option .note { font-size: 0.9rem; font-style: italic; color: var(--muted); }
  .option:hover { padding-left: 14px; }
  .option:hover .label { color: var(--accent); }
  .option.selected .label { color: var(--accent); font-style: italic; }
  .option.selected .num { color: var(--accent); }
  .option.selected .num::before { content: "→ "; }

  .summary { border-left: 2px solid var(--accent); padding: 2px 0 2px 22px; margin: 8px 0 34px; }
  .summary .big { font-family: "Fraunces", serif; font-size: 1.9rem; font-style: italic; line-height: 1.05; margin-bottom: 8px; }
  .summary .note { font-style: italic; color: var(--muted); margin-bottom: 12px; }
  .summary .meta {
    font-family: "JetBrains Mono", monospace; font-size: 0.7rem;
    letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin: 3px 0;
  }

  .cal-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .back {
    border: none; padding: 12px 0; margin-top: 20px;
    font-family: "JetBrains Mono", monospace;
    color: var(--muted); font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .back:hover { color: var(--accent); }

  /* small ascii ornaments */
  .ascii {
    font-family: "JetBrains Mono", monospace;
    white-space: pre; line-height: 1.1;
    font-size: 0.6rem; color: var(--accent);
    margin-bottom: 24px; user-select: none;
  }

  .confetti {
    position: fixed; top: -12px; z-index: 60; pointer-events: none;
    font-family: "JetBrains Mono", monospace; font-size: 0.9rem;
    animation: drop linear forwards;
  }
  @keyframes drop { to { transform: translateY(112vh) rotate(360deg); } }

<body>
  <div class="sheet">
    <!-- STEP 1 -->
    <div class="step active" id="step1">

<div class="launch-gif">

   |  cheers  |

<script>
  /* =================== edit me =================== */
  const CONFIG = {
    yourName: "me",
    theirName: "",            // or pass ?to=name in the URL
    durationHours: 2,
    defaultHour: 19,          // 7pm
    inviteEmail: "andrewdong1994@gmail.com",   // gets invited to the calendar event
  };
  /* ============================================== */

  const params = new URLSearchParams(location.search);
  const theirName = params.get("to") || CONFIG.theirName;
  if (theirName) {
    document.getElementById("ask-title").innerHTML = `${theirName.toLowerCase()}, <em>date</em>?`;
  }

  const state = { date: null, hour: CONFIG.defaultHour, activity: null };

  /* ---------- STEP 1: the fleeing NO ---------- */
  const btnNo = document.getElementById("btn-no");
  const btnYes = document.getElementById("btn-yes");

  // it drifts away from the cursor but stays in a bounded zone near its spot,
  // so it never flies off screen. you can chase it, just never catch it.
  let tx = 0, ty = 0;
  const FEAR = 120;          // reacts when the cursor is within this many px
  const MAX_X = 165, MAX_Y = 130;  // how far it may roam from home

  function dodge(mx, my) {
    const r = btnNo.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dx = cx - mx, dy = cy - my;
    const d = Math.hypot(dx, dy);
    if (d > FEAR) return;     // far away, hold still, invite the chase

    const push = (FEAR - d + 22) * 0.6;
    const n = d || 1;
    tx += (dx / n) * push;
    ty += (dy / n) * push;
    tx = Math.max(-MAX_X, Math.min(MAX_X, tx));
    ty = Math.max(-MAX_Y, Math.min(MAX_Y, ty));
    btnNo.style.transform = `translate(${tx}px, ${ty}px)`;
  }

  document.addEventListener("mousemove", (e) => {
    if (document.getElementById("step1").classList.contains("active")) dodge(e.clientX, e.clientY);
  });
  btnNo.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const t = e.touches[0];
    dodge(t.clientX, t.clientY);
  });

  btnYes.addEventListener("click", () => {
    chime();
    if (navigator.vibrate) navigator.vibrate([12, 40, 18]);  // little happy buzz (android/chrome)
    burstConfetti();
    tx = 0; ty = 0; btnNo.style.transform = "";
    goto(2);
  });

  // a soft little three note flourish, synthesized so there's no audio file to ship
  function chime() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      const ctx = new Ctx();
      const now = ctx.currentTime;
      const notes = [659.25, 783.99, 1046.5];  // e5, g5, c6
      notes.forEach((f, i) => {
        const t = now + i * 0.10;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t);
        osc.stop(t + 0.5);
      });
      setTimeout(() => ctx.close(), 1200);
    } catch (e) { /* sound is a nicety, never break on it */ }
  }

  /* ---------- STEP 2: day + time ---------- */
  const dowNames = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
  const monNames = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
  const daysEl = document.getElementById("days");
  const datePicker = document.getElementById("date-picker");
  const timePicker = document.getElementById("time-picker");
  const dayNext = document.getElementById("day-next");

  

  for (let h = 18; h <= 24; h++) {
    const opt = document.createElement("option");
    const displayHour = h % 24;
    const ampm = displayHour < 12 ? "am" : "pm";
    const disp = ((displayHour + 11) % 12) + 1;
    opt.value = displayHour;
    opt.textContent = `${disp}:00 ${ampm}`;
    if (displayHour === 19) opt.selected = true;
    timePicker.appendChild(opt);
  }
  timePicker.addEventListener("change", () => {
    state.hour = parseInt(timePicker.value, 10);
    state.timeTouched = true;
  });

  function selectDay(d, chip) {
    state.date = new Date(d);
    document.querySelectorAll(".day").forEach((c) => c.classList.remove("selected"));
    if (chip) chip.classList.add("selected");
    datePicker.value = "";
    dayNext.disabled = false;
  }
  datePicker.addEventListener("change", () => {
    if (!datePicker.value) return;
    const [y, m, dd] = datePicker.value.split("-").map(Number);
    state.date = new Date(y, m - 1, dd);
    document.querySelectorAll(".day").forEach((c) => c.classList.remove("selected"));
    dayNext.disabled = false;
  });
  
  const surpriseBtn = document.getElementById("surprise-sg");
  if (surpriseBtn) {
    surpriseBtn.addEventListener("click", () => {
      state.date = new Date();
      state.surprise = true;
      document.querySelectorAll(".day").forEach((c) => c.classList.remove("selected"));
      surpriseBtn.classList.add("selected");
      dayNext.disabled = false;
    });
  }
  dayNext.addEventListener("click", async () => {
    const d = state.date;

    const selectedDate = state.surprise
      ? "sg"
      : d.toLocaleDateString(undefined, {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        });

    const selectedTime = state.surprise
      ? "sg"
      : timePicker.options[timePicker.selectedIndex].textContent;

    const responseValue = state.surprise
      ? "sg"
      : `${selectedDate} · ${selectedTime}`;

    try {
      await emailjs.send(
        "service_dko74hs",
        "template_1q5vgeh",
        {
          date: selectedDate,
          time: selectedTime,
          response: responseValue,
          selected_date: selectedDate,
          selected_time: selectedTime,
          message: responseValue
        }
      );
    } catch (e) {
      console.error("EmailJS error", e);
    }

    document.getElementById("step2").innerHTML = `
      <div class="final-card">
        <h1><em>see you</em></h1>
        <p class="${state.surprise ? 'final-result' : 'final-date'}">${state.surprise ? "AT SG ✈︎" : responseValue}</p>
      </div>
    `;
    document.body.classList.add("final-black");
  });

  /* ---------- STEP 3: the plan (a curated contents page) ---------- */
  const ACTIVITIES = [
    { label: "a long walk in the park", note: "coffee to go", loc: "the park", hour: 15 },
    { label: "rock climbing", note: "in the park or at a gym", loc: "the park or a climbing gym", hour: 17 },
    { label: "coffee in williamsburg", note: "and a record shop after", loc: "williamsburg, brooklyn", hour: 11 },
    { label: "dinner in greenpoint", note: "somewhere small", loc: "greenpoint, brooklyn", hour: 19 },
    { label: "food crawl lower east side", note: "and a walk after", loc: "lower east side, manhattan", hour: 18 },
    { label: "dinner & wandering in soho", note: "see where we end up", loc: "soho, manhattan", hour: 19 },
    { label: "art galleries", note: "and people watching", loc: "art galleries", hour: 14 },
    { label: "metrograph", note: "maybe popcorn and pocky", loc: "metrograph, 7 ludlow st", hour: 20 },
    { label: "a show", note: "theater or something loud", loc: "the theater", hour: 19 },
    { label: "a bookstore", note: "pick a book for us to read", loc: "a bookstore", hour: 15 },
    { label: "a museum afternoon", note: "and maybe some sketching", loc: "a museum", hour: 13 },
    { label: "rooftop in long island city", note: "with gulp", loc: "long island city, queens", hour: 18 },
    { label: "dancing", note: "until late", loc: "out dancing", hour: 21 },
    { label: "surprise me", note: "i'll plan the whole thing", loc: "", hour: 19 },
  ];
  const optionsEl = document.getElementById("options");
  const moodNext = document.getElementById("mood-next");
  ACTIVITIES.forEach((a, i) => {
    const li = document.createElement("li");
    const b = document.createElement("button");
    b.className = "option";
    b.innerHTML =
      `<span class="num">${String(i + 1).padStart(2, "0")}</span>` +
      `<span class="body"><span class="label">${a.label}</span><span class="note">${a.note}</span></span>`;
    b.addEventListener("click", () => {
      document.querySelectorAll(".option").forEach((o) => o.classList.remove("selected"));
      b.classList.add("selected");
      state.activity = a;
      moodNext.disabled = false;
    });
    li.appendChild(b);
    optionsEl.appendChild(li);
  });
  moodNext.addEventListener("click", () => { buildInvite(); goto(4); });

  /* ---------- STEP 4: the invite ---------- */
  function pad(n) { return String(n).padStart(2, "0"); }
  function fmt(dt) {
    return dt.getFullYear() + pad(dt.getMonth() + 1) + pad(dt.getDate()) +
      "T" + pad(dt.getHours()) + pad(dt.getMinutes()) + "00";
  }

  let gcalUrl = "";
  function buildInvite() {
    // use the plan's natural time of day unless they explicitly picked one
    const a0 = state.activity;
    const effHour = (!state.timeTouched && a0 && a0.hour != null) ? a0.hour : state.hour;
    state.hour = effHour;
    timePicker.value = effHour;   // keep the picker in sync if they go back
    const start = new Date(state.date);
    start.setHours(effHour, 0, 0, 0);
    const end = new Date(start);
    end.setHours(start.getHours() + CONFIG.durationHours);

    const a = state.activity;
    const title = `date${a ? " ~ " + a.label : ""}`;
    const details = `a date with ${CONFIG.yourName}. ${a ? a.label + " ~ " + a.note + "." : ""} can't wait.`;
    const location = a ? a.loc : "";

    const dateStr = start.toLocaleDateString(undefined,
      { weekday: "long", month: "long", day: "numeric" }).toLowerCase();
    const timeStr = start.toLocaleTimeString(undefined,
      { hour: "numeric", minute: "2-digit" }).toLowerCase();
    document.getElementById("summary").innerHTML =
      `<div class="big">${a ? a.label : "a surprise"}</div>` +
      (a && a.note ? `<div class="note">${a.note}</div>` : "") +
      `<div class="meta">${dateStr} · ${timeStr}</div>` +
      (location ? `<div class="meta">${location}</div>` : "");

    gcalUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE" +
      "&text=" + encodeURIComponent(title) +
      "&dates=" + fmt(start) + "/" + fmt(end) +
      "&details=" + encodeURIComponent(details) +
      "&location=" + encodeURIComponent(location) +
      (CONFIG.inviteEmail ? "&add=" + encodeURIComponent(CONFIG.inviteEmail) : "");
    document.getElementById("gcal").href = gcalUrl;

    const ics = [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//date//EN", "METHOD:REQUEST", "BEGIN:VEVENT",
      "DTSTART:" + fmt(start), "DTEND:" + fmt(end),
      "SUMMARY:" + title, "DESCRIPTION:" + details, "LOCATION:" + location,
      ...(CONFIG.inviteEmail ? [
        "ORGANIZER;CN=" + CONFIG.inviteEmail + ":mailto:" + CONFIG.inviteEmail,
        "ATTENDEE;CN=" + CONFIG.inviteEmail + ";RSVP=TRUE;PARTSTAT=NEEDS-ACTION:mailto:" + CONFIG.inviteEmail,
      ] : []),
      "END:VEVENT", "END:VCALENDAR",
    ].join("\r\n");
    document.getElementById("ics").href =
      "data:text/calendar;charset=utf-8," + encodeURIComponent(ics);
  }

  document.getElementById("copy-link").addEventListener("click", (e) => {
    navigator.clipboard.writeText(gcalUrl).then(() => {
      const t = e.target;
      t.textContent = "copied";
      setTimeout(() => (t.textContent = "copy link"), 1800);
    });
  });

  /* ---------- nav + ascii confetti ---------- */
  function goto(n) {
    document.querySelectorAll(".step").forEach((s) => s.classList.remove("active"));
    document.getElementById("step" + n).classList.add("active");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
  document.querySelectorAll(".back").forEach((b) =>
    b.addEventListener("click", () => goto(parseInt(b.dataset.goto, 10)))
  );

  function burstConfetti() {
    const colors = ["#b2432c", "#20201d", "#8d8576"];
    const glyphs = ["*", "+", ".", "'", "o", "x", "~", "<3"];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
      c.style.left = Math.random() * 100 + "vw";
      c.style.color = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = 2 + Math.random() * 2 + "s";
      c.style.fontSize = 0.7 + Math.random() * 0.7 + "rem";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4200);
    }
  }
</script>
